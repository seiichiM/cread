<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 クリップボード読み上げツール (v1.2 - 高機能版)</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #fdfaf9; color: #333; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 90%; max-width: 450px; text-align: center; }
        h2 { margin: 0 0 20px 0; color: #cc4400; font-size: 22px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        textarea { width: 100%; height: 100px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 10px; padding: 12px; font-size: 14px; box-sizing: border-box; resize: none; background: #fafafa; }
        
        .control-group { text-align: left; margin-bottom: 15px; background: #fefefe; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
        .control-item { margin-bottom: 10px; }
        .control-item:last-child { margin-bottom: 0; }
        label { display: block; font-size: 12px; font-weight: bold; color: #666; margin-bottom: 5px; }
        
        select, input[type="range"] { width: 100%; cursor: pointer; }
        .range-value { float: right; font-weight: normal; color: #cc4400; }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 30px; cursor: pointer; border: none; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: #cc4400; color: white; box-shadow: 0 4px 10px rgba(204, 68, 0, 0.3); }
        .btn-primary:hover { background: #aa3300; transform: translateY(-1px); }
        .btn-secondary { background: #eee; color: #666; font-size: 14px; }
        .btn-secondary:hover { background: #ddd; }
        
        .status { margin-top: 20px; font-size: 13px; color: #888; font-style: italic; }
        .footer { margin-top: 20px; font-size: 10px; color: #ccc; }
    </style>

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</head>
<body>

<div class="card">
    <h2>📋 読み上げツール <small style="font-size: 12px; color: #999;">v1.2</small></h2>
    
    <textarea id="textInput" placeholder="ここに貼り付けるか、下のボタンで読み取ります"></textarea>
    
    <div class="control-group">
        <div class="control-item">
            <label>🎙️ 音声の種類:</label>
            <select id="voiceSelect"></select>
        </div>
        
        <div class="control-item">
            <label>⚡ スピード: <span id="rateValue" class="range-value">1.0</span></label>
            <input type="range" id="rateRange" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>
        
        <div class="control-item">
            <label>🎵 ピッチ（声の高さ）: <span id="pitchValue" class="range-value">1.0</span></label>
            <input type="range" id="pitchRange" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-primary" onclick="readFromClipboard()">▶ 読み上げる</button>
        <button class="btn btn-secondary" onclick="stopTTS()">⏹ 停止</button>
    </div>
    
    <div id="status" class="status">Ready</div>
    <div class="footer">Chris Secretarial Service</div>
</div>

<script>
    const synth = window.speechSynthesis;
    const textInput = document.getElementById('textInput');
    const statusEl = document.getElementById('status');
    const voiceSelect = document.getElementById('voiceSelect');
    const rateRange = document.getElementById('rateRange');
    const rateValue = document.getElementById('rateValue');
    const pitchRange = document.getElementById('pitchRange');
    const pitchValue = document.getElementById('pitchValue');
    
    let voices = [];

    // スライダーの値表示の連動
    rateRange.oninput = () => { rateValue.textContent = rateRange.value; };
    pitchRange.oninput = () => { pitchValue.textContent = pitchRange.value; };

    // 音声リストの取得（日本語優先）
    function populateVoiceList() {
        // OS/ブラウザによってはロードに時間がかかるため、日本語を含むものを最優先で並び替える
        const rawVoices = synth.getVoices();
        const jaVoices = rawVoices.filter(v => v.lang.includes('ja') || v.lang.includes('jp'));
        const otherVoices = rawVoices.filter(v => !v.lang.includes('ja') && !v.lang.includes('jp'));
        
        voices = [...jaVoices, ...otherVoices];
        
        voiceSelect.innerHTML = '';
        voices.forEach((voice, i) => {
            const option = document.createElement('option');
            option.textContent = `${voice.name} (${voice.lang})${voice.default ? ' [Default]' : ''}`;
            option.value = i;
            if (voice.lang.includes('ja')) {
                // 日本語の最初の一つを選択状態にする
                if (jaVoices[0] === voice) option.selected = true;
            }
            voiceSelect.appendChild(option);
        });
    }

    populateVoiceList();
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = populateVoiceList;
    }

    async function readFromClipboard() {
        try {
            // クリップボードからの取得（ブラウザ許可が必要）
            const text = await navigator.clipboard.readText();
            if (text.trim() !== "") {
                textInput.value = text;
            }
        } catch (err) {
            console.warn("Clipboard read permission denied, using textarea content.");
        }

        const currentText = textInput.value.trim();
        if (currentText === "") {
            statusEl.textContent = "テキストがありません";
            return;
        }

        speakText(currentText);
    }

    function speakText(text) {
        synth.cancel(); // 前の再生を止める

        const utterance = new SpeechSynthesisUtterance(text);
        
        // 選択された音声の設定
        if (voices[voiceSelect.value]) {
            utterance.voice = voices[voiceSelect.value];
        }

        utterance.rate = parseFloat(rateRange.value);
        utterance.pitch = parseFloat(pitchRange.value);
        utterance.lang = 'ja-JP';

        utterance.onstart = () => { statusEl.textContent = "🔊 読み上げ中..."; };
        utterance.onend = () => { statusEl.textContent = "✅ 完了"; };
        utterance.onerror = (e) => { 
            console.error(e);
            statusEl.textContent = "⚠️ エラーが発生しました"; 
        };

        synth.speak(utterance);
    }

    function stopTTS() {
        synth.cancel();
        statusEl.textContent = "⏹️ 停止しました";
    }
</script>

</body>
</html>
